<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Pedido de Produção | Gerenciador</title>
    <meta name="title" content="Pedido de Produção | Gerenciador" />
    <meta name="description" content="Gerencie seus pedidos de produção audiovisual. Crie listas, adicione itens, gere descrições com IA e exporte para PDF." />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://seusite.com/" />
    <meta property="og:title" content="Pedido de Produção | Gerenciador" />
    <meta property="og:description" content="Crie e gerencie listas de equipamentos e itens para produção audiovisual com ajuda de IA." />
    <!-- Imagem de preview para o WhatsApp (ideal 1200x630) -->
    <meta property="og:image" content="https://images.unsplash.com/photo-1598899134739-24c46f58b8c0?q=80&w=1200&auto=format&fit=crop" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://seusite.com/" />
    <meta property="twitter:title" content="Pedido de Produção | Gerenciador" />
    <meta property="twitter:description" content="Crie e gerencie listas de equipamentos e itens para produção audiovisual com ajuda de IA." />
    <meta property="twitter:image" content="https://images.unsplash.com/photo-1598899134739-24c46f58b8c0?q=80&w=1200&auto=format&fit=crop" />
  </head>
<script>
  window.addEventListener('error', function (e) {
    document.body.innerHTML = '<pre style="white-space:pre-wrap;color:#fff;background:#b00020;padding:16px;">Erro: ' + (e.message || e.error?.message || e.toString()) + '\\n' + (e.filename || '') + ':' + (e.lineno || '') + '</pre>';

});
 window.addEventListener('unhandledrejection', function (e) {
 const reason = e.reason && e.reason.message ? e.reason.message : JSON.stringify(e.reason);
 document.body.innerHTML = '<pre style="white-space:pre-wrap;color:#fff;background:#b00020;padding:16px;">Unhandled Rejection: ' + reason + '</pre>';
 });
 console.log('Client error overlay enabled');
</script>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
